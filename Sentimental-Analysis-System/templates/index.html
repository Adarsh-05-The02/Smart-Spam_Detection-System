<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>😊 Sentiment Analysis System</h1>

    <form method="POST">
        <textarea
        name="text"
        placeholder="Enter text here..."></textarea>

        <br>

        <button type="submit">
            Analyze Sentiment
        </button>
    </form>

    {% if sentiment %}
    <div class="result">
        {{ sentiment }}
    </div>
    {% endif %}

</div>

</body>
</html>
